<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produto Aplicativo</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:30px auto;
background:white;
padding:30px;
border-radius:15px;
}

.produto{
display:flex;
gap:30px;
flex-wrap:wrap;
}

.imagem img{
width:300px;
height:300px;
object-fit:cover;
border-radius:20px;
}

.info{
flex:1;
}

h1{
font-size:32px;
}

.preco{
font-size:30px;
color:#009900;
font-weight:bold;
margin:20px 0;
}

button{
width:100%;
padding:15px;
border:0;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

.comprar{
background:#00a650;
color:white;
}

.carrinho{
background:#3483fa;
color:white;
}

li{
margin:10px;
}


/* VIDEO */

.video{

margin-top:40px;
background:#eee;
padding:20px;
border-radius:15px;

}


.video video{

width:100%;
border-radius:15px;

}


/* AVALIAÇÃO */

.avaliacao{

margin-top:40px;
background:#eee;
padding:20px;
border-radius:15px;

}

.estrela{

font-size:45px;
cursor:pointer;
color:#ccc;

}

.estrela.ativa{

color:#ffc107;

}

#media{

font-size:20px;

}



/* COMENTARIOS */


.comentarios{

margin-top:40px;
background:#eee;
padding:20px;
border-radius:15px;

}


.comentarios input{

width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;

}


.comentarios button{

background:#111;
color:white;

}



.comentario{

background:white;
padding:15px;
margin-top:10px;
border-radius:10px;

}


.comentario strong{

color:#009900;

}


</style>

</head>


<body>


<header>

<h2>📱 Minha Loja de Aplicativos</h2>

</header>



<div class="container">


<div class="produto">


<div class="imagem">

<img id="imagem" src="app.jpg">

</div>



<div class="info">


<h1 id="nome">

Carregando...

</h1>



<div class="preco">

R$ <span id="preco"></span>

</div>



<button class="comprar" onclick="comprar()">

Comprar agora

</button>



<button class="carrinho" onclick="carrinho()">

🛒 Adicionar ao carrinho

</button>


</div>


</div>



<h2>🚀 Recursos do aplicativo</h2>


<ul id="recursos">

</ul>



<!-- VIDEO -->

<div class="video">


<h2>🎥 Demonstração do aplicativo</h2>


<video id="videoDemo" controls>

<source src="video.mp4" type="video/mp4">

Seu navegador não suporta vídeo.

</video>


</div>





<div class="avaliacao">


<h2>⭐ Avaliação do aplicativo</h2>


<div>


<span class="estrela">★</span>
<span class="estrela">★</span>
<span class="estrela">★</span>
<span class="estrela">★</span>
<span class="estrela">★</span>


</div>



<p id="media">

Nenhuma avaliação ainda

</p>


</div>





<!-- COMENTARIOS -->


<div class="comentarios">


<h2>💬 Comentários em tempo real</h2>


<input id="nomeComentario" placeholder="Seu nome">


<input id="textoComentario" placeholder="Digite seu comentário">


<button onclick="enviarComentario()">

Enviar comentário

</button>



<div id="listaComentarios">

</div>


</div>




</div>




<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getDatabase,
ref,
onValue,
push,
set

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";



const firebaseConfig = {

databaseURL:

"https://minha-loja-5477a-default-rtdb.europe-west1.firebasedatabase.app/"

};



const app = initializeApp(firebaseConfig);


const db = getDatabase(app);




// ID DO PRODUTO


const url = new URLSearchParams(window.location.search);

const id = url.get("id");



let produtoAtual;




// CARREGAR PRODUTO


const produtoRef = ref(db,"produtos/"+id);



onValue(produtoRef,(snapshot)=>{


const produto=snapshot.val();



if(produto){


produtoAtual=produto;



document.getElementById("nome").innerHTML =
produto.nome || "Aplicativo";



document.getElementById("preco").innerHTML =
produto.preco || "0";



document.getElementById("imagem").src =
produto.imagem || "app.jpg";



// VIDEO PELO FIREBASE


if(produto.video){

document.getElementById("videoDemo").src =
produto.video;

}



let lista="";



if(produto.recursos){


Object.values(produto.recursos).forEach((r)=>{


lista += "<li>✔ "+r+"</li>";


});


}


document.getElementById("recursos").innerHTML=lista;


}


});





// COMPRAR


window.comprar=function(){


window.location.href="pagina de pagamento.html?id="+id;


};





// CARRINHO


window.carrinho=function(){


let produto={


id:id,

nome:produtoAtual.nome,

preco:Number(produtoAtual.preco),

imagem:produtoAtual.imagem,

data:Date.now()


};



const novo=push(ref(db,"carrinhos/cliente1"));



set(novo,produto);



alert("✅ Aplicativo adicionado ao carrinho!");



};






// ESTRELAS


const estrelas=document.querySelectorAll(".estrela");



estrelas.forEach((estrela,index)=>{


estrela.onclick=function(){


let nota=index+1;



estrelas.forEach((e,i)=>{


if(i<nota)

e.classList.add("ativa");

else

e.classList.remove("ativa");


});



salvarNota(nota);



}


});





function salvarNota(valor){


const nova=push(

ref(db,"produtos/"+id+"/avaliacoes")

);



set(nova,{

nota:valor,

data:Date.now()

});


}





onValue(

ref(db,"produtos/"+id+"/avaliacoes"),

(snapshot)=>{


let soma=0;

let total=0;



snapshot.forEach((item)=>{


soma+=Number(item.val().nota);

total++;


});



if(total){


document.getElementById("media").innerHTML=

"⭐ Média: "+

(soma/total).toFixed(1)+

" de 5 ("+total+" avaliações)";


}



});







// COMENTARIOS TEMPO REAL



window.enviarComentario=function(){


let nome=document.getElementById("nomeComentario").value;

let texto=document.getElementById("textoComentario").value;



if(!nome || !texto){

alert("Preencha os campos");

return;

}



const novo=push(

ref(db,"produtos/"+id+"/comentarios")

);



set(novo,{

nome:nome,

texto:texto,

data:Date.now()

});



document.getElementById("textoComentario").value="";


};






onValue(

ref(db,"produtos/"+id+"/comentarios"),

(snapshot)=>{


let lista="";



snapshot.forEach((item)=>{


let c=item.val();



lista+=`

<div class="comentario">

<strong>${c.nome}</strong>

<p>${c.texto}</p>

</div>

`;


});



document.getElementById("listaComentarios").innerHTML=lista;


});



</script>


</body>
</html>
