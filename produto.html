<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produto Aplicativo</title>


<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}


header{
background:#111;
color:white;
padding:20px;
text-align:center;
}


.container{

max-width:900px;
margin:30px auto;
background:white;
padding:30px;
border-radius:15px;

}



.produto{

display:flex;
gap:30px;
flex-wrap:wrap;

}



.imagem img{

width:300px;
height:300px;
object-fit:cover;
border-radius:20px;

}



.info{

flex:1;

}



h1{

font-size:32px;

}



.preco{

font-size:30px;
color:#009900;
font-weight:bold;
margin:20px 0;

}



button{

width:100%;
padding:15px;
border:0;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:10px;

}



.comprar{

background:#00a650;
color:white;

}



.carrinho{

background:#3483fa;
color:white;

}



li{

margin:10px;

}



/* ESTRELAS */


.avaliacao{

margin-top:40px;
background:#eee;
padding:20px;
border-radius:15px;

}



.estrela{

font-size:45px;
cursor:pointer;
color:#ccc;

}



.estrela.ativa{

color:#ffc107;

}



#media{

font-size:20px;

}



</style>

</head>



<body>


<header>

<h2>📱 Minha Loja de Aplicativos</h2>

</header>




<div class="container">


<div class="produto">


<div class="imagem">

<img id="imagem" src="app.jpg">

</div>




<div class="info">


<h1 id="nome">

Carregando...

</h1>


<p id="descricao"></p>



<div class="preco">

R$ <span id="preco"></span>

</div>




<button class="comprar" onclick="comprar()">

Comprar agora

</button>



<button class="carrinho" onclick="carrinho()">

🛒 Adicionar ao carrinho

</button>



</div>


</div>





<h2>🚀 Recursos do aplicativo</h2>


<ul id="recursos">

</ul>





<div class="avaliacao">


<h2>⭐ Avaliação do aplicativo</h2>



<div>


<span class="estrela">★</span>
<span class="estrela">★</span>
<span class="estrela">★</span>
<span class="estrela">★</span>
<span class="estrela">★</span>


</div>



<p id="media">

Nenhuma avaliação ainda

</p>


</div>



</div>







<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getDatabase,
ref,
onValue,
push,
set

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";





const firebaseConfig = {

databaseURL:

"https://minha-loja-5477a-default-rtdb.europe-west1.firebasedatabase.app/"

};



const app = initializeApp(firebaseConfig);


const db = getDatabase(app);




// PEGAR ID DO PRODUTO

const url = new URLSearchParams(window.location.search);

const id = url.get("id");






// CARREGAR PRODUTO


const produtoRef = ref(db,"produtos/"+id);



let produtoAtual;



onValue(produtoRef,(snapshot)=>{


const produto=snapshot.val();


if(produto){


produtoAtual = produto;



document.getElementById("nome").innerHTML =
produto.nome || "Aplicativo";



document.getElementById("descricao").innerHTML =
produto.descricao || "";



document.getElementById("preco").innerHTML =
produto.preco || "0";



document.getElementById("imagem").src =
produto.imagem || "app.jpg";





let lista="";



if(produto.recursos){


Object.values(produto.recursos).forEach((r)=>{


lista += "<li>✔ "+r+"</li>";


});


}



document.getElementById("recursos").innerHTML = lista;



}



});










// COMPRAR


window.comprar=function(){


window.location.href =

"pagina de pagamento.html?id="+id;


};









// ADICIONAR AO CARRINHO


window.carrinho=function(){



let produto = {


id:id,


nome:produtoAtual.nome,


descricao:produtoAtual.descricao,


preco:Number(produtoAtual.preco),


imagem:produtoAtual.imagem,


data:Date.now()


};





// FIREBASE


const carrinhoRef = ref(

db,

"carrinhos/cliente1"

);




const novoProduto = push(carrinhoRef);



set(novoProduto,produto)

.then(()=>{





// LOCAL STORAGE


let carrinhoLocal = JSON.parse(

localStorage.getItem("carrinho")

) || [];






// impedir duplicado


let existe = carrinhoLocal.find(

(p)=>p.id == produto.id

);





if(!existe){


carrinhoLocal.push(produto);


localStorage.setItem(

"carrinho",

JSON.stringify(carrinhoLocal)

);


}




alert("✅ Aplicativo adicionado ao carrinho!");





})

.catch((erro)=>{


console.log(erro);


alert("❌ Erro ao adicionar");


});



};









// ESTRELAS


const estrelas = document.querySelectorAll(".estrela");



estrelas.forEach((estrela,index)=>{


estrela.onclick=function(){


let nota=index+1;



estrelas.forEach((e,i)=>{


if(i < nota){

e.classList.add("ativa");

}else{

e.classList.remove("ativa");

}


});



salvarNota(nota);



}



});







function salvarNota(valor){



const caminho = ref(

db,

"produtos/"+id+"/avaliacoes"

);





const novaNota = push(caminho);



set(novaNota,{

nota:valor,

data:Date.now()

});



}









// MOSTRAR MÉDIA


const notasRef = ref(

db,

"produtos/"+id+"/avaliacoes"

);





onValue(notasRef,(snapshot)=>{


let soma=0;

let total=0;



snapshot.forEach((item)=>{


soma += Number(item.val().nota);

total++;


});





if(total>0){


document.getElementById("media").innerHTML =


"⭐ Média: "

+(soma/total).toFixed(1)

+" de 5 ("+total+" avaliações)";


}



});



</script>
