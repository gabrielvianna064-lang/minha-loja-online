<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pagamento Sucesso</title>

<style>
body {
    font-family: Arial;
    background: #e8f5e9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

h1 {
    color: green;
}
</style>
</head>
<body>

<div class="card">
    <h1>✔ Pagamento realizado com sucesso!</h1>
    <p id="info"></p>
    <a href="loja.html">Voltar à loja</a>
</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";


/* CONFIG FIREBASE */
const firebaseConfig = {
    databaseURL: "https://minha-loja-5477a-default-rtdb.europe-west1.firebasedatabase.app/"
};


/* INIT */
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


/* PEGAR DADOS DO PAGAMENTO */
let metodo = localStorage.getItem("metodoPagamento");


/* CASO NÃO TENHA MÉTODO */
if(!metodo){
    metodo = "Não informado";
}


/* MOSTRAR NA TELA */
document.getElementById("info").innerText =
"✔ Pagamento realizado com sucesso!\n\nMétodo usado: " + metodo;


/* SALVAR NO FIREBASE */
const pedidoRef = push(ref(db, "pagamentos"));

set(pedidoRef, {

    metodoPagamento: metodo,

    status: "sucesso",

    data: new Date().toISOString()

});


</script>

</body>
</html>
